name: pkgdown site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "_pkgdown.yml"
      - "README.md"
      - "vignettes/**"
      - "man/**"
      - "R/**"
      - "DESCRIPTION"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::remotes
          needs: website
      - run: Rscript scripts/install_app_dependencies.R
      - run: Rscript scripts/build_pkgdown_site.R
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pkgdown-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
