name: R package validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: ${{ matrix.os }} / R current
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::pkgdown
            any::rcmdcheck
            any::remotes
            any::testthat
          needs: check

      - name: Install Analytics Workstation dependencies
        run: Rscript scripts/install_app_dependencies.R

      - name: R CMD check
        run: Rscript -e "rcmdcheck::rcmdcheck(args = '--no-manual', error_on = 'error')"

      - name: Deterministic QA
        run: |
          Rscript -e "source('app.R'); stopifnot(all(app_env$qa_build_week_demo()$status != 'error'))"
          Rscript -e "source('app.R'); stopifnot(all(app_env$qa_report_browser()$status != 'error'))"
          Rscript -e "source('app.R'); stopifnot(all(app_env$qa_agent_operation_runtime()$status != 'error'))"

  pkgdown:
    name: pkgdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::remotes
          needs: website

      - name: Install Analytics Workstation dependencies
        run: Rscript scripts/install_app_dependencies.R

      - name: Build pkgdown site
        run: Rscript scripts/build_pkgdown_site.R
