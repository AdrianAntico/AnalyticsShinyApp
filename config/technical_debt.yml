  - debt_id: BOUNDARY-GENAI-001
    title: No delegated persistence
    category: intentional_boundary
    status: accepted
    severity: high
    introduced_phase: 9
    last_reviewed_phase: 10.5
    affected_components:
      - result.persist
      - GenAI delegation policy
    description: >
      Persistent project writes cannot be delegated. `result.persist` always
      requires explicit approval.
    rationale: >
      Durable project mutation is a high-risk operation and must remain visibly
      user-approved.
    current_mitigation:
      - delegation allowlist excludes result.persist
      - approval fingerprint binding
      - durable audit
    resolution_trigger: >
      Reconsider only after a formal autonomous execution policy, preview
      workflow, and rollback/audit model exist.
    acceptance_criteria:
      - explicit autonomy policy exists
      - user can preview all persistent effects
      - rollback or compensating action policy exists
      - audit and authorization model is reviewed
    blocks:
      - autonomous persistence
      - delegated result writes
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_delegation_policy.md
      - docs/architecture/genai_action_layer.md
    owner: null
    target_phase: null
    notes: This is a safety boundary, not technical debt.

  - debt_id: BOUNDARY-GENAI-002
    title: No action chaining
    category: intentional_boundary
    status: accepted
    severity: high
    introduced_phase: 1
    last_reviewed_phase: 10.5
    affected_components:
      - GenAI action layer
      - proposal execution
    description: >
      One GenAI proposal executes at most one registered action. Actions cannot
      trigger other actions.
    rationale: >
      Chaining would obscure user intent, approval scope, resource fingerprints,
      and audit attribution.
    current_mitigation:
      - action registry has single handlers
      - proposal schema contains one action_id
      - handlers do not invoke action execution recursively
    resolution_trigger: >
      Reconsider only inside a future explicit planning/execution architecture
      with preview-before-commit and per-step approval policy.
    acceptance_criteria:
      - plan schema exists
      - each step has independent validation and authorization
      - failure/rollback semantics are defined
      - audit records step lineage
    blocks:
      - multi-step autonomous workflows
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_layer.md
    owner: null
    target_phase: null
    notes: null

  - debt_id: BOUNDARY-GENAI-003
    title: No arbitrary Code Runner execution through GenAI
    category: intentional_boundary
    status: accepted
