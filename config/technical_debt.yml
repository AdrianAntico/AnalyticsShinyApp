      - Project page persisted results
    description: >
      Invalid bundles are classified and withheld from inspection, but no repair
      workflow exists.
    rationale: >
      Avoiding repair is safer until bundle schemas and migration rules mature.
    current_mitigation:
      - health classification
      - content hash checks
      - invalid bundles are not opened
    resolution_trigger: >
      Add repair only after schema migration and user confirmation policies are
      defined.
    acceptance_criteria:
      - repair preview exists
      - repair actions are explicitly approved
      - original invalid content is preserved or backed up
      - repair outcomes are audited
    blocks:
      - user-driven persisted-result repair
    intentional_for_now: true
    source_refs:
      - docs/architecture/workspace_project_storage.md
      - R/storage_architecture.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-SCHEMA-001
    title: Schema migration strategy is limited
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 6
    last_reviewed_phase: 10.5
    affected_components:
      - persisted result manifests
      - workspace schema
      - project schema
      - audit ledger schema
      - delegation schema
      - temporary result contracts
    description: >
      Current readers reject unsupported schemas or use narrow compatibility
      paths. A general migration framework does not yet exist.
    rationale: >
      Strict rejection is safer while schemas are young. Migration should be
      designed after the most important contracts stabilize.
    current_mitigation:
      - explicit schema versions
      - unsupported-version diagnostics
      - schema inventory
      - compatibility aliases where needed
    resolution_trigger: >
      Required before intentionally changing persisted result, project, audit,
      or delegation schema versions in a breaking way.
    acceptance_criteria:
      - migration registry exists
      - migrations are versioned and tested
      - unsupported versions produce actionable diagnostics
      - backups or reversible migration plans exist for durable data
    blocks:
      - breaking schema evolution
      - durable project migration
    intentional_for_now: true
    source_refs:
      - docs/architecture/schema_version_inventory.md
      - docs/architecture/workspace_project_storage.md
      - docs/architecture/genai_action_audit_ledger.md
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-PROJECT-001
    title: Active dataset is the only trusted dataset ID
    category: deferred_capability
    status: planned
    severity: medium
    introduced_phase: 4
    last_reviewed_phase: 10.5
    affected_components:
