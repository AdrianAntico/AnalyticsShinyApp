schema_version: technical_debt_v1

items:
  - debt_id: TD-GENAI-001
    title: Synchronous Shiny-process execution
    category: technical_debt
    status: resolved
    severity: high
    introduced_phase: 4
    last_reviewed_phase: 12
    resolved_phase: 12
    affected_components:
      - analysis.preflight
      - analysis.run_registered
      - Shiny server session
    description: >
      GenAI-approved computational actions execute synchronously inside the
      active Shiny R process.
    rationale: >
      This was acceptable for bounded prototype modules, but it constrains
      long-running modules, UI responsiveness, hard cancellation, and future
      multi-user deployments.
    current_mitigation:
      - bounded execution profiles
      - row and column limits
      - short timeout checks
      - no training or artifact generation in temporary execution
    resolution_trigger: >
      Must be addressed before enabling long-running registered analysis,
      delegated computation, or modules with indivisible expensive stages.
    acceptance_criteria:
      - registered analysis execution can run in an isolated worker
      - the UI remains responsive while execution runs
      - worker failure is captured without crashing the app
      - audit records distinguish worker failure from handler failure
    blocks:
      - long-running registered modules
      - delegated computation
      - robust multi-user execution
    intentional_for_now: false
    source_refs:
      - docs/architecture/genai_action_layer.md
      - docs/async_processing_architecture.md
    owner: null
    target_phase: null
    resolution_summary: >
      Phase 12 introduced project-scoped isolated worker execution through
      callr for analysis.run_registered handlers dataset_profile,
      model_assessment_regression, and model_assessment_binary. Legacy
      no-project compatibility remains synchronous and is intentionally
      excluded from durable job recovery.
    notes: Phase 12 QA verified isolated execution for the three enabled handlers through qa_genai_isolated_execution() and qa_genai_action_layer().

  - debt_id: TD-GENAI-002
    title: Cooperative cancellation only
    category: technical_debt
    status: resolved
    severity: medium
    introduced_phase: 4
    last_reviewed_phase: 12
    resolved_phase: 12
    affected_components:
      - analysis.preflight
      - analysis.run_registered
    description: >
      Cancellation is observed only between bounded stages. It cannot interrupt
      a running indivisible operation.
    rationale: >
      Cooperative cancellation is easy to reason about for bounded handlers but
      is insufficient for slow model execution, network calls, rendering, or
      external package operations that cannot yield control.
    current_mitigation:
      - staged handlers
      - cancellation flags
      - timeout checks
      - bounded module allowlist
    resolution_trigger: >
      Must be addressed before enabling modules whose single execution stage can
      materially exceed the action timeout.
    acceptance_criteria:
      - cancellation can terminate an isolated worker
      - partial temporary state is cleaned safely
      - terminal audit events identify hard cancellation
      - user-facing job status remains inspectable
    blocks:
      - long-running model execution
      - autonomous execution modes
    intentional_for_now: false
    source_refs:
      - docs/architecture/genai_action_layer.md
      - docs/async_processing_architecture.md
    owner: null
    target_phase: null
    resolution_summary: >
      Phase 12 added hard cancellation for project-scoped isolated registered
      analysis jobs. Cancelling an isolated job terminates the worker process,
      removes incomplete handoff output, marks the job cancelled, and leaves no
      temporary result.
    notes: Legacy no-project synchronous compatibility can still use cooperative checks, but the canonical project-scoped execution path supports hard cancellation.

  - debt_id: TD-GENAI-003
    title: Oversized GenAI action layer file
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 5
    last_reviewed_phase: 12
    affected_components:
      - R/genai_actions.R
    description: >
      R/genai_actions.R contains action registry definitions, proposal parsing,
      policy validation, resource resolution, execution, temporary-result
      contracts, persistence handoff, result inspection, module-specific
      preflight, module-specific execution, QA, and UI helpers.
    rationale: >
      Keeping the first vertical slices together reduced integration risk, but
      the file is now large enough to slow review and make ownership boundaries
      less obvious.
    current_mitigation:
      - extensive QA coverage
      - stable action registry
      - explicit future decomposition recommendation
      - targeted result/mode contracts extracted to R/genai_result_contracts.R
    resolution_trigger: >
      Split before adding a third executable module or materially changing
      persistence/audit behavior.
    acceptance_criteria:
      - registry/proposal/policy/execution/result modules are separated
      - public function names remain stable
      - existing GenAI action QA remains green
      - no behavior changes are introduced by extraction
    blocks:
      - rapid module onboarding
      - low-risk code review
    intentional_for_now: true
    source_refs:
      - R/genai_actions.R
      - docs/architecture/genai_action_layer.md
    owner: null
    target_phase: null
    notes: Phase 12 kept worker orchestration outside R/genai_actions.R by adding R/genai_worker_contracts.R, R/genai_worker_runtime.R, and R/genai_job_manager.R. The action layer still owns proposal policy, execution normalization, persistence, UI helpers, and broad QA. Suggested future files include R/genai_action_registry.R, R/genai_action_proposals.R, R/genai_action_policy.R, R/genai_action_execution.R, R/genai_action_results.R, R/genai_action_persistence.R, and R/genai_action_modules.R.

  - debt_id: TD-GENAI-004
    title: Duplicated result-type branching
    category: technical_debt
    status: open
    severity: low
    introduced_phase: 10
    last_reviewed_phase: 11
    affected_components:
      - temporary result validation
      - result persistence
      - persisted result browser
      - GenAI safe summaries
    description: >
      Dataset-profile and model-assessment result handling share similar
      branching across validation, fingerprints, persistence serialization,
      browser rendering, and summaries.
    rationale: >
      Explicit branches were safer for the second module, but additional result
      types will make the duplication harder to audit.
    current_mitigation:
      - supported result-type allowlist
      - output contract versions
      - result-type QA
      - result-type descriptors in R/genai_result_contracts.R
      - model_assessment mode descriptors in R/genai_result_contracts.R
    resolution_trigger: >
      Must be addressed before adding a third executable module or adding
      module-specific browser/render behavior that cannot use descriptors.
    acceptance_criteria:
      - result-type descriptors define required components centrally
      - validation, serialization, summary, and browser behavior share the descriptor
      - existing result bundles remain readable
    blocks:
      - scalable result-type onboarding
    intentional_for_now: true
    source_refs:
      - R/genai_actions.R
      - R/storage_architecture.R
      - R/page_project.R
    owner: null
    target_phase: null
    notes: Phase 11 added a targeted registry for dataset_profile, model_assessment_regression, and model_assessment_binary. Required fields, output contracts, supported types, and model-assessment mode/result mappings now route through descriptors. Some duplication remains in serialization, browser rendering, and QA setup.

  - debt_id: TD-GENAI-005
    title: Module-specific preflight logic is not yet abstracted
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 10
    last_reviewed_phase: 10.5
    affected_components:
      - dataset_profile preflight
      - model_assessment regression preflight
      - module registry role metadata
    description: >
      Model-assessment regression preflight is implemented as a dedicated
      handler rather than through a general role-aware preflight grammar.
    rationale: >
      Dedicated code was safer for the first scored-output slice, but future
      modules will need shared role, type, sufficiency, and problem-type checks.
    current_mitigation:
      - module registry role metadata
      - explicit configuration snapshot validation
      - focused QA for the second module
    resolution_trigger: >
      Must be addressed before adding several modules with overlapping
      role/type/sufficiency checks.
    acceptance_criteria:
      - reusable preflight check builders exist
      - module-specific checks can compose shared checks
      - existing model-assessment preflight output remains compatible
    blocks:
      - low-risk module onboarding
    intentional_for_now: true
    source_refs:
      - R/genai_actions.R
      - R/registry_modules.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-GENAI-006
    title: Hosted worker process availability
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 12
    last_reviewed_phase: 12
    affected_components:
      - GenAI isolated execution
      - callr worker backend
      - hosted Shiny deployments
    description: >
      Phase 12 uses callr child R processes for project-scoped isolated
      analysis execution. Some hosted Shiny environments may disallow child
      process creation or process termination.
    rationale: >
      callr gives the local workstation reliable Windows process handles and
      hard cancellation. Hosted deployments need an environment-specific
      worker policy before isolated execution can be assumed available.
    current_mitigation:
      - backend availability check
      - app startup does not require callr
      - isolated execution reports unavailable when backend packages are missing
      - legacy no-project synchronous compatibility remains narrow
    resolution_trigger: >
      Must be addressed before supporting hosted deployments where child R
      process creation is unavailable or administratively restricted.
    acceptance_criteria:
      - hosted worker capability detection exists
      - unsupported hosted deployments degrade clearly
      - an approved hosted-safe worker backend or queue is available
      - hard cancellation semantics are preserved or explicitly downgraded
    blocks:
      - hosted isolated execution guarantees
      - multi-user hosted GenAI computation
    intentional_for_now: true
    source_refs:
      - R/genai_job_manager.R
      - docs/architecture/genai_job_execution.md
    owner: null
    target_phase: null
    notes: Local Windows callr execution is validated in Phase 12 QA. This item tracks deployment portability, not local correctness.

  - debt_id: TD-STORAGE-001
    title: No cross-process project locking
    category: technical_debt
    status: open
    severity: high
    introduced_phase: 6
    last_reviewed_phase: 10.5
    affected_components:
      - project storage
      - result persistence
      - collector writes
    description: >
      Project writes are guarded by path validation and staged commits, but
      there is no cross-process project lock.
    rationale: >
      Single-session local usage can tolerate this initially. Multi-session or
      hosted deployments need conflict prevention.
    current_mitigation:
      - project-root validation
      - staged same-project writes
      - content hashes
      - idempotency keys for result persistence
    resolution_trigger: >
      Must be addressed before supporting concurrent writers to the same
      project or hosted multi-user project sharing.
    acceptance_criteria:
      - project-level write lock exists
      - lock acquisition failures are reported clearly
      - stale locks are recoverable
      - lock behavior is covered by QA
    blocks:
      - multi-user project editing
      - concurrent project writes
    intentional_for_now: true
    source_refs:
      - docs/architecture/workspace_project_storage.md
      - R/storage_architecture.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-STORAGE-002
    title: No cross-process persistence locking
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 6
    last_reviewed_phase: 10.5
    affected_components:
      - result.persist
      - project/results
    description: >
      Result persistence uses staged writes and idempotency but not a
      cross-process lock specific to the result root.
    rationale: >
      Atomic commit and idempotency reduce duplicate writes in a single process,
      but do not fully govern concurrent app processes.
    current_mitigation:
      - atomic directory commit
      - manifest health checks
      - idempotency keys
      - invalid bundle quarantine by discovery
    resolution_trigger: >
      Must be addressed before concurrent GenAI persistence can target the same
      project from multiple sessions.
    acceptance_criteria:
      - result-root lock exists
      - duplicate creation is prevented across processes
      - lock failures produce structured errors
    blocks:
      - concurrent persistence
    intentional_for_now: true
    source_refs:
      - docs/architecture/workspace_project_storage.md
      - R/storage_architecture.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-AUDIT-001
    title: No cross-process audit locking
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 8
    last_reviewed_phase: 10.5
    affected_components:
      - durable GenAI action audit ledger
      - logs/genai_actions/events.ndjson
    description: >
      The audit ledger appends events and chains hashes, but does not yet use a
      cross-process append lock.
    rationale: >
      Single-process append is sufficient for local development. Multiple
      writers could interleave event writes or checkpoint updates.
    current_mitigation:
      - append-only NDJSON
      - hash-chain validation
      - checkpoint regeneration
      - reconciliation health states
    resolution_trigger: >
      Must be addressed before multiple app processes can write to the same
      project audit ledger.
    acceptance_criteria:
      - ledger append lock exists
      - concurrent append test passes
      - checkpoint writes remain consistent
      - hash-chain QA covers interleaving
    blocks:
      - multi-process audit writing
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_audit_ledger.md
      - R/genai_audit_ledger.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-AUDIT-002
    title: Audit reconciliation focuses on persisted results
    category: technical_debt
    status: open
    severity: low
    introduced_phase: 8
    last_reviewed_phase: 10.5
    affected_components:
      - audit reconciliation
      - Project page
      - result.persist
    description: >
      Reconciliation is strongest for persisted-result commits and does not yet
      fully reconcile every possible proposal lifecycle event.
    rationale: >
      Persisted results were the first durable mutation. UI-only lifecycle
      reconciliation can be added later without changing safety boundaries.
    current_mitigation:
      - project-scoped audit events
      - persisted-result reconciliation
      - ledger health checks
    resolution_trigger: >
      Expand when UI action history becomes a user-facing governance surface.
    acceptance_criteria:
      - proposal, validation, approval, execution, and terminal events reconcile
      - UI-only action discrepancies are classified
      - Project page displays reconciliation scope
    blocks:
      - full governance timeline
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_audit_ledger.md
      - R/genai_audit_ledger.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-AUDIT-003
    title: Proposal lifecycle events are not emitted from every UI surface
    category: technical_debt
