  - debt_id: TD-RESULT-001
    title: Temporary results are session-local
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 5
    last_reviewed_phase: 10.5
    affected_components:
      - analysis.run_registered
      - result.persist
      - temporary result store
    description: >
      Temporary analysis results live in Shiny session memory until explicitly
      persisted. They are not durable across restart.
    rationale: >
      Session-local results preserve the separation between computation and
      persistence. They also reduce accidental durable writes.
    current_mitigation:
      - explicit result.persist action
      - temporary result expiration
      - project continuity checks
    resolution_trigger: >
      Revisit if long-running or expensive temporary computations should survive
      browser refresh before approval.
    acceptance_criteria:
      - recoverable temporary job/result store exists
      - recovery does not bypass approval
      - expired and orphaned records are cleaned safely
    blocks:
      - restart recovery for unpersisted GenAI computations
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_layer.md
      - R/app_server.R
    owner: null
    target_phase: null
    notes: null

  - debt_id: TD-RESULT-002
    title: No durable temporary-job recovery
    category: technical_debt
    status: resolved
    severity: medium
    introduced_phase: 5
    last_reviewed_phase: 12
    resolved_phase: 12
    affected_components:
      - GenAI temporary jobs
      - analysis.run_registered
      - Mission Control job status
    description: >
      Registered-analysis job state is session-local and not reconstructed after
      restart.
    rationale: >
      Initial temporary jobs are bounded and cheap enough to rerun. More
      expensive future jobs may need durable recovery.
    current_mitigation:
      - bounded handlers
      - explicit persisted-result path
      - clear session-local documentation
    resolution_trigger: >
      Must be addressed before expensive computations or async execution become
      standard registered actions.
    acceptance_criteria:
      - job records are persisted safely
      - restart can classify running/completed/failed jobs
      - no job can resume without policy validation
    blocks:
      - durable job history
      - robust async recovery
    intentional_for_now: false
    source_refs:
      - docs/architecture/genai_action_layer.md
      - docs/async_processing_architecture.md
    owner: null
    target_phase: null
    resolution_summary: >
      Phase 12 added durable project-scoped job records, recovery
      classification, validated worker handoffs, and temporary-result
      reconstruction from completed validated jobs. Recovered results remain
      temporary and still require separate result.persist approval.
    notes: Running-worker reattachment is not implemented; uncertain live workers are classified safely instead of adopted.

  - debt_id: TD-RESULT-003
    title: Invalid persisted bundles are diagnosed but not repaired
    category: technical_debt
