      - analysis.run_registered
      - dataset registry
    description: >
      GenAI computational actions currently accept only `active_dataset` as the
      trusted dataset identifier.
    rationale: >
      A single trusted dataset identity prevents model-supplied paths and avoids
      premature dataset registry design.
    current_mitigation:
      - active app-state dataset resolver
      - invented dataset IDs are rejected
      - no model-supplied paths
    resolution_trigger: >
      Add when projects support multiple named datasets, train/test splits, or
      scored datasets as first-class resources.
    acceptance_criteria:
      - trusted dataset registry exists
      - each dataset has stable ID/version/provenance
      - action validation resolves dataset IDs from trusted state only
      - dataset selection is audited
    blocks:
      - multi-dataset project workflows
      - explicit scored-dataset selection
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_layer.md
      - R/genai_actions.R
    owner: null
    target_phase: null
    notes: null

