  - debt_id: TD-IMPROVEMENT-001
    title: Improvement ledger deduplication is signature-based
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 13
    last_reviewed_phase: 13
    affected_components:
      - Improvement Ledger
      - deterministic ingestion
      - GenAI concern ingestion
    description: >
      Improvement item deduplication uses deterministic issue signatures derived
      from project id, item type, affected resource, and normalized issue
      meaning. This prevents obvious duplicates but is not yet a richer
      reconciliation model that can merge related findings, split ambiguous
      issues, or track semantic drift over time.
    rationale: >
      Phase 13 needed safe duplicate prevention without introducing probabilistic
      merging or autonomous issue rewriting.
    current_mitigation:
      - stable normalized_issue_signature
      - affected resource binding
      - occurrence_count updates
      - evidence append on repeat detection
      - user feedback and duplicate status support
    resolution_trigger: >
      Before high-volume automatic ingestion from many diagnostics or GenAI
      concern proposals.
    acceptance_criteria:
      - duplicate detection handles related findings without over-merging
      - resolved item regressions are classified distinctly
      - user-marked duplicates influence future deterministic matching
      - QA covers semantic-near duplicate cases
    blocks:
      - high-volume autonomous improvement loop ingestion
      - learned issue consolidation
    intentional_for_now: true
    source_refs:
      - R/improvement_ledger.R
      - docs/architecture/improvement_ledger.md
    owner: null
    target_phase: null
    notes: Created during Phase 13 as an honest limitation of the first ledger implementation.

  - debt_id: TD-IMPROVEMENT-002
    title: Improvement ledger indexes and performance policy are minimal
    category: technical_debt
    status: open
    severity: medium
    introduced_phase: 13
    last_reviewed_phase: 13
    affected_components:
      - Improvement Ledger
      - Project page
      - Mission Control
      - GenAI context summary
    description: >
      The ledger stores one current JSON item per item plus append-only event
      history, but it does not yet maintain materialized indexes beyond the
      checkpoint. Project and Mission Control summaries read current item files
      directly, which is acceptable for early project volumes but not for large
      hosted or multi-user ledgers.
    rationale: >
      Phase 13 prioritized correctness, restart durability, governance semantics,
      and safe write paths before optimizing large-scale ledger reads.
    current_mitigation:
      - bounded UI rendering
      - bounded GenAI context summaries
      - checkpoint metadata
      - project-scoped storage
    resolution_trigger: >
      Before hosted projects or long-running projects depend on thousands of
      improvement items or high-frequency automatic ingestion.
    acceptance_criteria:
      - materialized indexes or compact summaries are updated atomically
      - Mission Control reads bounded index state
      - stale indexes are detected and classified
      - QA covers large ledger volumes and restart discovery
    blocks:
      - hosted multi-user improvement governance
      - high-frequency automatic issue ingestion
    intentional_for_now: true
    source_refs:
      - R/improvement_ledger.R
      - R/page_project.R
      - R/page_mission_control.R
      - docs/architecture/improvement_ledger.md
