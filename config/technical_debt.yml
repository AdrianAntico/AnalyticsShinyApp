  - debt_id: BOUNDARY-GENAI-008
    title: Model Assessment excludes multiclass and model mutation
    category: intentional_boundary
    status: accepted
    severity: medium
    introduced_phase: 11
    last_reviewed_phase: 11
    affected_components:
      - model_assessment
      - analysis.preflight
      - analysis.run_registered
      - result.persist
    description: >
      GenAI Model Assessment now supports bounded scored-output diagnostics for
      regression and binary classification only. Multiclass assessment, model
      training, tuning, model selection, threshold optimization, external
      scoring, report generation, and artifact generation remain disabled.
    rationale: >
      Each additional analytical mode requires trusted configuration, output
      contracts, validation, persistence, inspection, and audit behavior. Phase
      11 intentionally proves multi-mode support without expanding into
      mutation or autonomous model work.
    current_mitigation:
      - model_assessment mode registry exposes only regression and binary_classification
      - GenAI can supply only module_id and dataset_id
      - binary threshold comes from trusted app state and is not optimized
      - temporary execution writes no files and creates no artifacts or reports
    resolution_trigger: >
      Review before adding multiclass diagnostics, training/tuning actions,
      threshold optimization, or external scoring.
    acceptance_criteria:
      - new mode-specific trusted configuration schema exists
      - preflight blocks unsupported task types and unsafe inputs
      - temporary result contract excludes raw data and executable content
      - persistence, inspection, and audit are covered by QA
    blocks:
      - multiclass model assessment
      - model training through GenAI
      - threshold optimization through GenAI
    intentional_for_now: true
    source_refs:
      - docs/architecture/genai_action_layer.md
      - R/genai_result_contracts.R
      - R/genai_actions.R
